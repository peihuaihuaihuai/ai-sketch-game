# Render Blueprint — Infrastructure as Code
# Push this file to your git repo, then connect the repo on dashboard.render.com
# Render will auto-detect this file and create the service.

services:
  - type: web
    name: ai-sketch-game
    runtime: python
    region: singapore                  # 亚洲区域，中国访问延迟最低
    plan: free                         # Render 免费层
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info
    pythonVersion: 3.10.9
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
